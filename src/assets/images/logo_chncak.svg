<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="600" height="160" rx="18" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="600" height="4" rx="2" fill="#22c55e" opacity="0.8"/>
  <rect x="0" y="156" width="600" height="4" rx="2" fill="#22c55e" opacity="0.8"/>

  <!-- Croix pharmaceutique -->
  <g transform="translate(18, 18)" filter="url(#shadow)">
    <rect x="37" y="10" width="22" height="66" rx="5" fill="url(#crossGrad)"/>
    <rect x="10" y="37" width="66" height="22" rx="5" fill="url(#crossGrad)"/>
    <rect x="37" y="10" width="10" height="66" rx="5" fill="white" opacity="0.12"/>
    <rect x="10" y="37" width="66" height="10" rx="5" fill="white" opacity="0.12"/>
    <!-- Coupe -->
    <rect x="42" y="52" width="12" height="3" rx="1.5" fill="white"/>
    <rect x="44.5" y="36" width="7" height="17" rx="1" fill="white"/>
    <path d="M36 38 Q43 48 48 48 Q53 48 60 38" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Serpent -->
    <path d="M48 37 Q56 40 51 44 Q57 47 51 51 Q57 54 51 57"
          stroke="#bbf7d0" stroke-width="2.8" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="51" cy="36" r="2.5" fill="#bbf7d0"/>
    <circle cx="49.8" cy="35.2" r="0.8" fill="#0c4a6e"/>
  </g>

  <!-- Textes -->
  <text x="122" y="50"
        font-family="Georgia, serif"
        font-size="19" font-weight="bold"
        fill="white" letter-spacing="1">
    Centre Hospitalier National
  </text>

  <text x="122" y="82"
        font-family="Georgia, serif"
        font-size="25" font-weight="bold"
        fill="#4ade80" letter-spacing="1.5">
    Cheikh Ahmadoul Khadim
  </text>

  <line x1="122" y1="94" x2="578" y2="94" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>

  <text x="122" y="114"
        font-family="Arial, sans-serif"
        font-size="13" font-weight="600"
        fill="#7dd3fc" letter-spacing="3">
    PHARMACIE  ·  CHNCAK
  </text>

  <text x="122" y="138"
        font-family="Arial, sans-serif"
        font-size="12"
        fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    Système de gestion des inventaires pharmaceutiques
  </text>

  <!-- Étoiles -->
  <text x="560" y="42" font-size="12" fill="#fbbf24" opacity="0.8">✦</text>
  <text x="572" y="60" font-size="8"  fill="#fbbf24" opacity="0.5">✦</text>
  <text x="550" y="55" font-size="6"  fill="#fbbf24" opacity="0.4">✦</text>
</svg>